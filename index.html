<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananto Mohammad | Creative Portfolio</title>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            background-color: #0d0d0d; 
            margin: 0; 
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .play-button {
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 15px solid white;
            margin-left: 5px;
        }
        
        #root { width: 100%; min-height: 100vh; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const ProjectRow = ({ title, projects, onProjectClick }) => {
            const scrollRef = useRef(null);
            const scroll = (direction) => {
                if (scrollRef.current) {
                    const { scrollLeft, clientWidth } = scrollRef.current;
                    const scrollTo = direction === 'left' ? scrollLeft - clientWidth * 0.8 : scrollLeft + clientWidth * 0.8;
                    scrollRef.current.scrollTo({ left: scrollTo, behavior: 'smooth' });
                }
            };

            return (
                <div className="mb-10 group/row relative px-4 md:px-0 max-w-[1400px] mx-auto">
                    <div className="flex items-center justify-between mb-4">
                        <h2 className="text-sm font-bold text-white tracking-[0.2em] uppercase italic flex items-center gap-3">
                            <span className="w-1 h-4 bg-amber-500 rounded-sm"></span>
                            {title}
                        </h2>
                        <div className="flex gap-2 opacity-0 group-hover/row:opacity-100 transition-opacity">
                            <button onClick={() => scroll('left')} className="p-2 rounded-full bg-zinc-900 border border-white/10 hover:bg-amber-500 hover:text-black transition-all"><Icon name="chevron-left" size={16}/></button>
                            <button onClick={() => scroll('right')} className="p-2 rounded-full bg-zinc-900 border border-white/10 hover:bg-amber-500 hover:text-black transition-all"><Icon name="chevron-right" size={16}/></button>
                        </div>
                    </div>
                    
                    <div ref={scrollRef} className="flex gap-6 overflow-x-auto scrollbar-hide snap-x snap-mandatory pb-2">
                        {projects.map((project) => (
                            <div 
                                key={project.id} 
                                onClick={() => onProjectClick(project)} 
                                className="min-w-[340px] max-w-[340px] snap-start group cursor-pointer"
                            >
                                <div className="aspect-video relative overflow-hidden bg-black rounded-sm border border-white/5 group-hover:border-amber-500/50 transition-all duration-300">
                                    <img 
                                        src={project.thumbnail} 
                                        className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500" 
                                        alt={project.title} 
                                    />
                                    <div className="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                        <div className="w-12 h-12 bg-white/10 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/20 transform scale-90 group-hover:scale-100 transition-transform duration-300">
                                            <div className="play-button"></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-3 text-center">
                                    <h3 className="text-[11px] font-medium text-zinc-400 group-hover:text-white transition-colors tracking-tight uppercase">
                                        {project.title}
                                    </h3>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [showContactModal, setShowContactModal] = useState(false);
            const [selectedVideo, setSelectedVideo] = useState(null);

            const portfolioData = {
                "Motion Design": [
                    { id: 101, title: 'Choosing a Dental Plan', thumbnail: 'https://img.youtube.com/vi/Vehb9cLXxNo/maxresdefault.jpg', type: 'video', videoId: 'Vehb9cLXxNo' },
                    { id: 102, title: 'Affordable Dental Coverage', thumbnail: 'https://img.youtube.com/vi/hruffxWgEIA/maxresdefault.jpg', type: 'video', videoId: 'hruffxWgEIA' },
                    { id: 103, title: 'Intel Game Night: Main Event', thumbnail: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=800', type: 'video', videoId: '' },
                    { id: 104, title: 'AXE Dark & Gold - Laboratory', thumbnail: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800', type: 'video', videoId: '' },
                ],
                "Video and Podcast": [
                    { id: 201, title: 'Unmasking DEI: Dr. Carol Swain', thumbnail: 'https://img.youtube.com/vi/BESkd04Xty8/maxresdefault.jpg', type: 'video', videoId: 'BESkd04Xty8' },
                    { id: 202, title: 'VA Stripped Veterans Rights', thumbnail: 'https://img.youtube.com/vi/38U9T-NIID8/maxresdefault.jpg', type: 'video', videoId: '38U9T-NIID8' },
                    { id: 203, title: 'The Story of Jacob Schick', thumbnail: 'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?auto=format&fit=crop&q=80&w=800', type: 'video', videoId: '' },
                ],
                "AD Design": [
                    { id: 301, title: 'TIME Studios Production Ident', thumbnail: 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&q=80&w=800', type: 'graphic' },
                    { id: 302, title: 'Samsung X Rihanna - Case Study', thumbnail: 'https://images.unsplash.com/photo-1492619375914-88005aa9e8fb?auto=format&fit=crop&q=80&w=800', type: 'graphic' },
                ],
                "Ai AD Design": [
                    { id: 401, title: 'Future Cities Generative', thumbnail: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=800', type: 'graphic' },
                    { id: 402, title: 'Neural Landscapes Series', thumbnail: 'https://images.unsplash.com/photo-1618005198919-d3d4b5a92ead?auto=format&fit=crop&q=80&w=800', type: 'graphic' },
                ],
                "Digital Design": [
                    { id: 501, title: 'Modern UI Interaction', thumbnail: 'https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?auto=format&fit=crop&q=80&w=800', type: 'graphic' },
                ],
                "Digital AD Design": [
                    { id: 601, title: 'Billboard: Times Square', thumbnail: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=800', type: 'graphic' },
                ],
                "Email Design": [
                    { id: 701, title: 'Newsletter: Daily News', thumbnail: 'https://images.unsplash.com/photo-1563986768609-322da13575f3?auto=format&fit=crop&q=80&w=800', type: 'html' },
                ],
                "Landing Page Design": [
                    { id: 801, title: 'SaaS Product Page', thumbnail: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=800', type: 'html' },
                ],
                "Social Media Design": [
                    { id: 901, title: 'Instagram Brand Kit', thumbnail: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&q=80&w=800', type: 'graphic' },
                ],
                "Thumbnail Design": [
                    { id: 1001, title: 'High Performance Gaming', thumbnail: 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&q=80&w=800', type: 'graphic' },
                ]
            };

            const personalInfo = {
                name: "Ananto Mohammad",
                email: "anantomohammad@gmail.com",
                phone: "+1 929 321 4400",
                location: "New York, NY",
                bio: "New York based creative with 10 years experience in all things video."
            };

            return (
                <div className="min-h-screen pb-24">
                    
                    {/* Restored Custom Centered Header */}
                    <header className="py-20 text-center animate-fade-in">
                        <div className="max-w-6xl mx-auto px-6">
                            <h1 className="text-4xl md:text-5xl font-black text-white border-4 border-amber-500 px-10 py-4 inline-block uppercase italic mb-6 cursor-default hover:bg-amber-500 hover:text-black transition-all">
                                {personalInfo.name}
                            </h1>
                            <p className="text-[11px] text-zinc-500 uppercase tracking-[0.7em] font-bold mb-10">
                                {personalInfo.bio}
                            </p>
                            
                            <div className="flex flex-wrap justify-center gap-4">
                                <a 
                                    href="#" 
                                    className="flex items-center gap-2 px-8 py-3.5 rounded-full border border-white/10 hover:bg-white/5 transition-all text-xs font-bold uppercase tracking-widest"
                                >
                                    <Icon name="download" size={14} /> Resume
                                </a>
                                <button 
                                    onClick={() => setShowContactModal(true)} 
                                    className="flex items-center gap-2 px-10 py-3.5 rounded-full bg-amber-500 text-black font-black uppercase text-xs tracking-[0.2em] hover:bg-amber-400 transition-all shadow-xl shadow-amber-500/20"
                                >
                                    <Icon name="mail" size={14} /> Contact
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1500px] mx-auto">
                        {Object.entries(portfolioData).map(([category, projects]) => (
                            <ProjectRow 
                                key={category} 
                                title={category} 
                                projects={projects} 
                                onProjectClick={(p) => p.videoId && setSelectedVideo(p)} 
                            />
                        ))}
                    </main>

                    {/* Video Player Modal */}
                    {selectedVideo && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-10 bg-black/95 backdrop-blur-md">
                            <div className="relative w-full max-w-5xl aspect-video bg-black shadow-2xl ring-1 ring-white/10">
                                <button 
                                    onClick={() => setSelectedVideo(null)} 
                                    className="absolute -top-10 right-0 text-white font-bold uppercase text-[10px] tracking-widest flex items-center gap-2 hover:text-amber-500 transition-colors"
                                >
                                    CLOSE <Icon name="x" size={20}/>
                                </button>
                                <iframe 
                                    width="100%" 
                                    height="100%" 
                                    src={`https://www.youtube.com/embed/${selectedVideo.videoId}?autoplay=1`} 
                                    frameBorder="0" 
                                    allowFullScreen
                                ></iframe>
                            </div>
                        </div>
                    )}

                    {/* Contact Modal */}
                    {showContactModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl" onClick={() => setShowContactModal(false)}>
                            <div className="relative bg-[#0d0d0d] border border-white/10 p-10 max-w-md w-full" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowContactModal(false)} className="absolute top-6 right-6 text-zinc-500 hover:text-white transition-colors"><Icon name="x"/></button>
                                <h2 className="text-3xl font-black text-white italic uppercase tracking-tighter mb-8 border-b-2 border-amber-500 inline-block pb-1">Contact</h2>
                                <div className="space-y-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-zinc-900 rounded-lg flex items-center justify-center text-amber-500"><Icon name="mail"/></div>
                                        <div><p className="text-[10px] text-zinc-500 uppercase font-black">Email</p><a href={`mailto:${personalInfo.email}`} className="text-white text-lg">{personalInfo.email}</a></div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-zinc-900 rounded-lg flex items-center justify-center text-amber-500"><Icon name="phone"/></div>
                                        <div><p className="text-[10px] text-zinc-500 uppercase font-black">Phone</p><a href={`tel:${personalInfo.phone}`} className="text-white text-lg">{personalInfo.phone}</a></div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-zinc-900 rounded-lg flex items-center justify-center text-amber-500"><Icon name="map-pin"/></div>
                                        <div><p className="text-[10px] text-zinc-500 uppercase font-black">Location</p><p className="text-white text-lg">{personalInfo.location}</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 text-center border-t border-white/5 py-10 opacity-30">
                        <p className="text-[10px] font-bold uppercase tracking-[0.5em]">© 2025 - {personalInfo.name} Media</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
