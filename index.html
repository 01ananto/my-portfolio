<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ananto Mohammad | Creative Portfolio</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        body {
            background-color: #0d0d0d;
            margin: 0;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .play-button {
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 15px solid white;
            margin-left: 5px;
        }

        #root { width: 100%; min-height: 100vh; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }

        .modal-blur {
            backdrop-filter: blur(12px);
            background-color: rgba(0, 0, 0, 0.92);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const ProjectRow = ({ title, categoryKey, projects, onProjectClick }) => {
            const scrollRef = useRef(null);

            const scroll = (direction) => {
                if (scrollRef.current) {
                    const { scrollLeft, clientWidth } = scrollRef.current;
                    const scrollTo = direction === 'left'
                        ? scrollLeft - clientWidth * 0.8
                        : scrollLeft + clientWidth * 0.8;

                    scrollRef.current.scrollTo({ left: scrollTo, behavior: 'smooth' });
                }
            };

            return (
                <div className="mb-10 group/row relative px-4 md:px-0 max-w-[1400px] mx-auto">
                    <div className="flex items-center justify-between mb-4">
                        <h2 className="text-sm font-bold text-white tracking-[0.2em] uppercase italic flex items-center gap-3">
                            <span className="w-1 h-4 bg-amber-500 rounded-sm"></span>
                            {title}
                        </h2>

                        <div className="flex gap-2 opacity-100 transition-opacity">
                            <button
                                onClick={() => scroll('left')}
                                className="p-2 rounded-full bg-zinc-900 border border-white/10 hover:bg-amber-500 hover:text-black transition-all"
                            >
                                <Icon name="chevron-left" size={16} />
                            </button>

                            <button
                                onClick={() => scroll('right')}
                                className="p-2 rounded-full bg-zinc-900 border border-white/10 hover:bg-amber-500 hover:text-black transition-all"
                            >
                                <Icon name="chevron-right" size={16} />
                            </button>
                        </div>
                    </div>

                    <div ref={scrollRef} className="flex gap-6 overflow-x-auto scrollbar-hide snap-x snap-mandatory pb-2">
                        {projects.map((project, index) => (
                            <div
                                key={project.id}
                                onClick={() => onProjectClick(categoryKey, index)}
                                className="min-w-[340px] max-w-[340px] snap-start group cursor-pointer"
                            >
                                <div className="aspect-video relative overflow-hidden bg-black rounded-sm border border-white/5 group-hover:border-amber-500/50 transition-all duration-300">
                                    <img
                                        src={project.thumbnail}
                                        className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500"
                                        alt={project.title}
                                    />

                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                        {project.type === 'video' ? (
                                            <div className="w-12 h-12 bg-black/45 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/20 opacity-100">
                                                <div className="play-button"></div>
                                            </div>
                                        ) : (
                                            <div className="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                <div className="w-12 h-12 bg-white/10 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/20 transform scale-90 group-hover:scale-100 transition-transform duration-300">
                                                    <Icon name="external-link" className="text-white" size={20} />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                </div>

                                <div className="mt-3 text-center">
                                    <h3 className="text-[11px] font-medium text-zinc-400 group-hover:text-white transition-colors tracking-tight uppercase">
                                        {project.title}
                                    </h3>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

                        { id: 615, title: 'Magazine Layout Intro', thumbnail: 'https://i.ibb.co/gZQqtwGz/Magazine-Layout-0.jpg', type: 'graphic', subtitle: 'Design Preview' },
                        { id: 616, title: 'Magazine Layout II', thumbnail: 'https://i.ibb.co/8nTrPmt6/Magazine-Layout-2-v2.jpg', type: 'graphic', subtitle: 'Featured Design' },
                        { id: 617, title: 'Facebook Campaign', thumbnail: 'https://i.ibb.co/6JfMxPHr/Facebook-AD.jpg', type: 'graphic', subtitle: 'Paid Media' }

                        { id: 707, title: 'Liberty Lane Email', thumbnail: 'http://dedicated.amac.us/dedicated/libertylaneroadside/liberty-lane-roadside-email-banner-v2.jpg', type: 'html-file', subtitle: 'Email Design', file: 'email-liberty-lane.html' },
                        { id: 708, title: 'Rosemark Email', thumbnail: 'http://dedicated.amac.us/dedicated/rosemark-email-banner-122425.jpg', type: 'html-file', subtitle: 'Email Design', file: 'email-rosemark.html' }
                    ]
                },
                landing: {
                    title: 'Landing Page Design',
                    items: [
                        { id: 803, title: 'America 250 Landing Page', thumbnail: 'thumbnail/thumbnail-america250.jpg', type: 'html-file', subtitle: 'Landing Page', file: 'landing-america-250.html' },
                        { id: 806, title: 'Rosemark Landing Page', thumbnail: 'thumbnail/thumbnail-landing-rosemark.jpg', type: 'html-file', subtitle: 'Landing Page', file: 'landing-rosemark.html' },
                        { id: 801, title: 'Join Landing Page', thumbnail: 'thumbnail/thumbnail-join.jpg', type: 'html-file', subtitle: 'Landing Page', file: 'landing-join.html' },
                        { id: 802, title: 'Sweepstakes Landing Page', thumbnail: 'thumbnail/thumbnail-sweepstakes.jpg', type: 'html-file', subtitle: 'Landing Page', file: 'landing-sweepstake.html' },

            };

                setViewer({ active: true, category, index });
            };

                setViewer({ active: false, category: null, index: null });
            };

            const navigateViewer = useCallback((direction) => {
                if (!viewer.active) return;
                const items = portfolioData[viewer.category].items;
                let newIndex = viewer.index + direction;
                if (newIndex < 0) newIndex = items.length - 1;
                if (newIndex >= items.length) newIndex = 0;
                setViewer(prev => ({ ...prev, index: newIndex }));

                        <div
                            className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl animate-fade-in"
                            onClick={() => setShowContactModal(false)}
                        >
                            <div
                                className="relative bg-[#0d0d0d] border border-white/10 p-10 max-w-md w-full shadow-2xl"
                                onClick={e => e.stopPropagation()}
                            >
                                <button
                                    onClick={() => setShowContactModal(false)}
                                    className="absolute top-6 right-6 text-zinc-500 hover:text-white transition-colors"
                                >
                                    <Icon name="x" />
                                </button>

                                <h2 className="text-3xl font-black text-white italic uppercase tracking-tighter mb-8 border-b-2 border-amber-500 inline-block pb-1">
                                    Contact
                                </h2>

                                <div className="space-y-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-zinc-900 rounded-lg flex items-center justify-center text-amber-500">
                                            <Icon name="mail" />
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-zinc-500 uppercase font-black">Email</p>
                                            <a href={`mailto:${personalInfo.email}`} className="text-white text-lg">
                                                {personalInfo.email}
                                            </a>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-zinc-900 rounded-lg flex items-center justify-center text-amber-500">
                                            <Icon name="phone" />
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-zinc-500 uppercase font-black">Phone</p>
                                            <a href={`tel:${personalInfo.phone}`} className="text-white text-lg">
                                                {personalInfo.phone}
                                            </a>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-zinc-900 rounded-lg flex items-center justify-center text-amber-500">
                                            <Icon name="map-pin" />
                                        </div>
                                        <div>
                                            <p className="text-[10px] text-zinc-500 uppercase font-black">Location</p>
                                            <p className="text-white text-lg">{personalInfo.location}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 text-center border-t border-white/5 py-10 opacity-30">
                        <p className="text-[10px] font-bold uppercase tracking-[0.5em]">
                            © 2025 - {personalInfo.name} Media
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
